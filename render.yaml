services:
  - type: web
    name: datafeed-server
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 1
      - key: DOCKER_ENV
        value: true
      - key: EXCHANGE
        value: BINANCE
    healthCheckPath: /health
